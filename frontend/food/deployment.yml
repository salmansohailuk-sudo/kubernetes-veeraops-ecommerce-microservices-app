apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-deployment
  labels:
    app: food
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food
  template:
    metadata:
      labels:
        app: food
    spec:
      containers:
      - name: food
        image: 058264106614.dkr.ecr.us-east-1.amazonaws.com/shopping-site-food:55615e795f393eba125641ac8c5f26c4877b03a6
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: food-service
  labels:
    app: food
spec:
  type: ClusterIP
  selector:
    app: food
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
